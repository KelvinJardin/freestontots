services:
  freestontots:
    container_name: app
    build:
      context: .
      dockerfile: dev.Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always
    ports:
      - '8081:3000'
    depends_on:
      - db
    networks:
      - freestontots
    command: sh -c "
        npx prisma migrate deploy &&
        npx prisma generate &&
        npx prisma db seed &&
        npx next dev
      "

  db:
    container_name: db
    build:
      context: .
      dockerfile: db.Dockerfile
    env_file:
      - .env
    restart: always
    networks:
      - freestontots
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - '13306:3306'


volumes:
  db-data:

networks:
  freestontots:
