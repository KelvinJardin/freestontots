services:
  freestontots:
    container_name: app
    build:
      context: .
      dockerfile: dev.Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always
    ports:
      - '8081:3000'
    depends_on:
      - db
    networks:
      - freestontots
    command: sh -c "
        npx prisma migrate deploy &&
        npx prisma generate &&
        npx prisma db seed &&
        npx next dev
      "

  db:
    container_name: db
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freestontots
    restart: always
    networks:
      - freestontots
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5434:5432'


volumes:
  db-data:

networks:
  freestontots:
